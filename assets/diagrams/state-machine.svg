<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500">
  <defs>
    <marker id="arrowhead-state" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#f9fafb" />
  
  <!-- Title -->
  <text x="450" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">System State Machine</text>
  <text x="450" y="58" font-size="12" text-anchor="middle" fill="#6b7280">Firmware lifecycle: MONITORING → WATERING → COOLDOWN → repeat</text>
  
  <!-- STATE: MONITORING -->
  <rect x="50" y="120" width="160" height="100" fill="#dbeafe" stroke="#0284c7" stroke-width="2.5" rx="8" />
  <text x="130" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">MONITORING</text>
  <text x="130" y="170" font-size="10" text-anchor="middle" fill="#075985">Read sensors</text>
  <text x="130" y="186" font-size="10" text-anchor="middle" fill="#075985">Run 7-check logic</text>
  <text x="130" y="202" font-size="10" text-anchor="middle" fill="#075985">Send telemetry</text>
  <text x="130" y="218" font-size="9" text-anchor="middle" fill="#0284c7">(Interval: 2000ms)</text>
  
  <!-- Arrow: MONITORING → WATERING (if shouldWater=true) -->
  <path d="M 210 170 Q 310 150 410 170" stroke="#16a34a" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="310" y="140" font-size="9" fill="#16a34a" font-weight="bold">shouldWater = true</text>
  
  <!-- STATE: WATERING -->
  <rect x="410" y="120" width="160" height="100" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" rx="8" />
  <text x="490" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#15803d">WATERING</text>
  <text x="490" y="170" font-size="10" text-anchor="middle" fill="#166534">Pump ON</text>
  <text x="490" y="186" font-size="10" text-anchor="middle" fill="#166534">Monitor runtime</text>
  <text x="490" y="202" font-size="10" text-anchor="middle" fill="#166534">Watchdog check</text>
  <text x="490" y="218" font-size="9" text-anchor="middle" fill="#16a34a">(Max: 5s or 10s limit)</text>
  
  <!-- Arrow: WATERING → COOLDOWN (pump stops normally) -->
  <path d="M 490 220 Q 490 300 490 340" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="510" y="280" font-size="9" font-weight="bold" fill="#333">Pump stopped</text>
  <text x="510" y="295" font-size="9" font-weight="bold" fill="#333">(5s elapsed or</text>
  <text x="510" y="308" font-size="9" font-weight="bold" fill="#333">watchdog trigger)</text>
  
  <!-- STATE: COOLDOWN -->
  <rect x="410" y="340" width="160" height="100" fill="#fef3c7" stroke="#d97706" stroke-width="2.5" rx="8" />
  <text x="490" y="370" font-size="14" font-weight="bold" text-anchor="middle" fill="#b45309">COOLDOWN</text>
  <text x="490" y="390" font-size="10" text-anchor="middle" fill="#92400e">Pump OFF</text>
  <text x="490" y="406" font-size="10" text-anchor="middle" fill="#92400e">Wait: 60000ms</text>
  <text x="490" y="422" font-size="10" text-anchor="middle" fill="#92400e">Track lastWaterTime_</text>
  <text x="490" y="438" font-size="9" text-anchor="middle" fill="#d97706">(Prevent pump stress)</text>
  
  <!-- Arrow: COOLDOWN → MONITORING (cooldown expires) -->
  <path d="M 410 390 Q 250 390 210 170" stroke="#333" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="280" y="380" font-size="9" font-weight="bold" fill="#333">Cooldown</text>
  <text x="280" y="395" font-size="9" font-weight="bold" fill="#333">expired</text>
  
  <!-- STATE: ERROR (right side) -->
  <rect x="650" y="120" width="160" height="100" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" rx="8" />
  <text x="730" y="150" font-size="14" font-weight="bold" text-anchor="middle" fill="#991b1b">ERROR</text>
  <text x="730" y="170" font-size="10" text-anchor="middle" fill="#7f1d1d">Pump force OFF</text>
  <text x="730" y="186" font-size="10" text-anchor="middle" fill="#7f1d1d">Set pumpState =</text>
  <text x="730" y="202" font-size="10" text-anchor="middle" fill="#7f1d1d">PUMP_WATCHDOG_</text>
  <text x="730" y="218" font-size="9" text-anchor="middle" fill="#991b1b">TRIGGERED</text>
  
  <!-- Arrow: WATERING → ERROR (watchdog triggered) -->
  <path d="M 570 170 Q 610 145 650 160" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="600" y="140" font-size="9" fill="#dc2626" font-weight="bold">watchdog timer</text>
  <text x="600" y="153" font-size="9" fill="#dc2626" font-weight="bold">> 10 seconds</text>
  
  <!-- Arrow: COOLDOWN → ERROR (sensors failed) -->
  <path d="M 570 360 Q 610 300 700 220" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="620" y="300" font-size="9" fill="#dc2626" font-weight="bold">sensor frame</text>
  <text x="620" y="313" font-size="9" fill="#dc2626" font-weight="bold">invalid</text>
  
  <!-- Arrow: ERROR → MONITORING (sensors recover) -->
  <path d="M 650 300 Q 400 450 210 200" stroke="#333" stroke-width="2" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead-state)" />
  <text x="400" y="380" font-size="9" fill="#6b7280" font-weight="bold">sensors valid</text>
  
  <!-- Legend -->
  <text x="50" y="470" font-size="10" font-weight="bold" fill="#1f2937">Transitions:</text>
  <line x1="50" y1="480" x2="120" y2="480" stroke="#16a34a" stroke-width="2" />
  <text x="130" y="485" font-size="9" fill="#333">Normal path (healthy)</text>
  
  <line x1="350" y1="480" x2="420" y2="480" stroke="#dc2626" stroke-width="2" />
  <text x="430" y="485" font-size="9" fill="#333">Error path (fault)</text>
  
  <line x1="650" y1="480" x2="720" y2="480" stroke="#333" stroke-width="2" stroke-dasharray="5,5" />
  <text x="730" y="485" font-size="9" fill="#333">Recovery path</text>
</svg>
