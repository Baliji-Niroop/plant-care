<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="600" viewBox="0 0 1000 600">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#dc2626" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1000" height="600" fill="#f9fafb" />
  
  <!-- Title -->
  <text x="500" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#1f2937">Decision Logic Flow - 7 Safety Checks</text>
  <text x="500" y="58" font-size="12" text-anchor="middle" fill="#6b7280">All must PASS for pump to activate</text>
  
  <!-- START -->
  <ellipse cx="500" cy="100" rx="50" ry="30" fill="#3b82f6" stroke="#1e40af" stroke-width="2" />
  <text x="500" y="107" font-size="12" font-weight="bold" text-anchor="middle" fill="white">START</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="130" x2="500" y2="160" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  
  <!-- CHECK 1: Sensor Valid -->
  <rect x="350" y="160" width="300" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5" />
  <text x="500" y="180" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">1. Sensor Frame Valid?</text>
  <text x="500" y="200" font-size="10" text-anchor="middle" fill="#0c4a6e">Temperature AND Humidity not NaN</text>
  
  <!-- Fail path right -->
  <line x1="650" y1="185" x2="720" y2="185" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" />
  <text x="685" y="175" font-size="9" fill="#dc2626" font-weight="bold">FAIL</text>
  <rect x="720" y="170" width="150" height="30" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3" />
  <text x="795" y="190" font-size="10" text-anchor="middle" fill="#991b1b">Sensor read failed</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="210" x2="500" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="520" y="228" font-size="9" fill="#16a34a" font-weight="bold">PASS</text>
  
  <!-- CHECK 2: Soil Dry -->
  <rect x="350" y="240" width="300" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5" />
  <text x="500" y="260" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">2. Soil Dry?</text>
  <text x="500" y="280" font-size="10" text-anchor="middle" fill="#0c4a6e">Moisture % &lt; 60% threshold</text>
  
  <!-- Fail path right -->
  <line x1="650" y1="265" x2="720" y2="265" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" />
  <text x="685" y="255" font-size="9" fill="#dc2626" font-weight="bold">FAIL</text>
  <rect x="720" y="250" width="150" height="30" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3" />
  <text x="795" y="270" font-size="10" text-anchor="middle" fill="#991b1b">Soil moisture fine</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="290" x2="500" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="520" y="308" font-size="9" fill="#16a34a" font-weight="bold">PASS</text>
  
  <!-- CHECK 3: Debounce -->
  <rect x="350" y="320" width="300" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5" />
  <text x="500" y="340" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">3. Debounce OK?</text>
  <text x="500" y="360" font-size="10" text-anchor="middle" fill="#0c4a6e">≥ 3 consecutive dry readings</text>
  
  <!-- Fail path right -->
  <line x1="650" y1="345" x2="720" y2="345" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" />
  <text x="645" y="335" font-size="9" fill="#dc2626" font-weight="bold">FAIL</text>
  <rect x="720" y="330" width="150" height="30" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3" />
  <text x="795" y="350" font-size="10" text-anchor="middle" fill="#991b1b">Waiting for stable read</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="370" x2="500" y2="400" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="520" y="388" font-size="9" fill="#16a34a" font-weight="bold">PASS</text>
  
  <!-- CHECK 4: Temperature Range -->
  <rect x="350" y="400" width="300" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5" />
  <text x="500" y="420" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">4. Temp in Range?</text>
  <text x="500" y="440" font-size="10" text-anchor="middle" fill="#0c4a6e">15°C ≤ temp ≤ 40°C</text>
  
  <!-- Fail path right -->
  <line x1="650" y1="425" x2="720" y2="425" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" />
  <text x="645" y="415" font-size="9" fill="#dc2626" font-weight="bold">FAIL</text>
  <rect x="720" y="410" width="150" height="30" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" rx="3" />
  <text x="795" y="430" font-size="10" text-anchor="middle" fill="#991b1b">Temp/humidity unsafe</text>
  
  <!-- Arrow down -->
  <line x1="500" y1="450" x2="500" y2="480" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="520" y="468" font-size="9" fill="#16a34a" font-weight="bold">PASS</text>
  
  <!-- CHECK 5: Humidity Min -->
  <rect x="350" y="480" width="300" height="50" fill="#dbeafe" stroke="#0284c7" stroke-width="2" rx="5" />
  <text x="500" y="500" font-size="11" font-weight="bold" text-anchor="middle" fill="#0c4a6e">5. Humidity ≥ 30%?</text>
  <text x="500" y="520" font-size="10" text-anchor="middle" fill="#0c4a6e">Below 30% = too dry for watering</text>
  
  <!-- Fail path right -->
  <line x1="650" y1="505" x2="720" y2="505" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-red)" />
  <text x="645" y="495" font-size="9" fill="#dc2626" font-weight="bold">FAIL</text>
  
  <!-- Arrow down - will continue to next -->
  <line x1="500" y1="530" x2="500" y2="560" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="520" y="548" font-size="9" fill="#16a34a" font-weight="bold">PASS</text>
  
  <!-- SUCCESS BOX -->
  <rect x="350" y="560" width="300" height="35" fill="#dcfce7" stroke="#16a34a" stroke-width="2.5" rx="5" />
  <text x="500" y="583" font-size="12" font-weight="bold" text-anchor="middle" fill="#15803d">✓ ALL CHECKS PASSED → WATER (5000ms pump run)</text>
  
  <!-- Right side: Additional checks 6-7 -->
  <text x="50" y="200" font-size="11" font-weight="bold" fill="#5b21b6">Other mandatory checks:</text>
  <rect x="50" y="215" width="240" height="60" fill="#f0e7ff" stroke="#7c3aed" stroke-width="1.5" rx="3" />
  <text x="60" y="235" font-size="10" fill="#5b21b6">6. Tank has water?</text>
  <text x="60" y="250" font-size="9" fill="#7c3aed">GPIO5 LOW = water OK</text>
  <text x="60" y="265" font-size="10" fill="#5b21b6">7. Cooldown expired?</text>
  <text x="60" y="280" font-size="9" fill="#7c3aed">NOT in 60s cooldown window</text>
  
  <!-- Pump states -->
  <rect x="50" y="310" width="240" height="100" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="3" />
  <text x="60" y="330" font-size="11" font-weight="bold" fill="#b45309">Pump State Machine:</text>
  <text x="60" y="350" font-size="10" fill="#92400e">PUMP_OFF (normal)</text>
  <text x="60" y="365" font-size="10" fill="#92400e">PUMP_RUNNING (5s max)</text>
  <text x="60" y="380" font-size="10" fill="#92400e">PUMP_WATCHDOG_TRIGGERED</text>
  <text x="60" y="395" font-size="9" fill="#b45309">(emergency if &gt; 10s)</text>
  <text x="60" y="408" font-size="9" fill="#92400e">Cooldown after: 60s</text>
</svg>
